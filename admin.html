<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
</head>
<body>

<h2>HR Location</h2>

<div id="output">
    Waiting for location...
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCd4uN1sz1EuLH5_jFpOHIglXyz7H_BdlA",
  authDomain: "location-demo-2ae1e.firebaseapp.com",
  projectId: "location-demo-2ae1e",
  storageBucket: "location-demo-2ae1e.firebasestorage.app",
  messagingSenderId: "168093712387",
  appId: "1:168093712387:web:835fe973df364274b4ce36",
  measurementId: "G-TDFJNXXFP9",
  databaseURL: "https://location-demo-2ae1e-default-rtdb.firebaseio.com/"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

onValue(ref(db, "hr_location"), (snapshot) => {

    const data = snapshot.val();

    if (data) {

        document.getElementById("output").innerHTML = `
        <b>City:</b> ${data.city}<br><br>

        <b>State:</b> ${data.state}<br><br>

        <b>Country:</b> ${data.country}<br><br>

        <b>Area:</b> ${data.suburb}<br><br>

        <b>Neighbourhood:</b> ${data.neighbourhood}<br><br>

        <b>Road:</b> ${data.road}<br><br>

        <b>Postal Code:</b> ${data.postcode}<br><br>

        <b>Latitude:</b> ${data.latitude}<br><br>

        <b>Longitude:</b> ${data.longitude}<br><br>

        <b>Accuracy:</b> ${Math.round(data.accuracy)} meters<br><br>

        <b>Time:</b> ${data.time}<br><br>

        <a href="${data.mapLink}" target="_blank">
            Open in Google Maps
        </a>
        `;
    }

});

</script>

</body>
</html>
