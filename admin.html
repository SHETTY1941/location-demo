<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
</head>
<body>

<h2>HR Location</h2>

<p id="output">Waiting for location...</p>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAc6kd76Iw54N041Nyf5ezVecxgo8AbWGA",
  authDomain: "locationdemo-f8ba4.firebaseapp.com",
  projectId: "locationdemo-f8ba4",
  storageBucket: "locationdemo-f8ba4.firebasestorage.app",
  messagingSenderId: "501022300080",
  appId: "1:501022300080:web:2e7b791721b4dab5c22875",
  measurementId: "G-3TQ7RHSKW0",
  databaseURL: "https://locationdemo-f8ba4-default-rtdb.asia-southeast1.firebasedatabase.app/"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

onValue(ref(db, "hr_location"), (snapshot) => {

    const data = snapshot.val();

    if (data) {

        document.getElementById("output").innerHTML = `
        <b>City:</b> ${data.city}<br><br>

        <b>State:</b> ${data.state}<br><br>

        <b>Country:</b> ${data.country}<br><br>

        <b>Area:</b> ${data.suburb}<br><br>

        <b>Neighbourhood:</b> ${data.neighbourhood}<br><br>

        <b>Road:</b> ${data.road}<br><br>

        <b>Postal Code:</b> ${data.postcode}<br><br>

        <b>Latitude:</b> ${data.latitude}<br><br>

        <b>Longitude:</b> ${data.longitude}<br><br>

        <b>Time:</b> ${data.time}<br><br>

        <a href="${data.mapLink}" target="_blank">
            Open in Google Maps
        </a>
        `;
    }

});
</script>

</body>
</html>
