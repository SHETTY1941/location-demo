<!DOCTYPE html>
<html>
<head>
    <title>Location Sharing Demo</title>
</head>
<body>

<h2>Location Sharing Demo</h2>
<button onclick="shareLocation()">Share My Location</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-app.js";
import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCd4uN1sz1EuLH5_jFpOHIglXyz7H_BdlA",
  authDomain: "location-demo-2ae1e.firebaseapp.com",
  projectId: "location-demo-2ae1e",
  storageBucket: "location-demo-2ae1e.firebasestorage.app",
  messagingSenderId: "168093712387",
  appId: "1:168093712387:web:835fe973df364274b4ce36",
  measurementId: "G-TDFJNXXFP9",
  databaseURL: "https://location-demo-2ae1e-default-rtdb.firebaseio.com/"
};
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

window.shareLocation = function () {

    navigator.geolocation.getCurrentPosition(

        async (position) => {

            const lat = position.coords.latitude;
            const lon = position.coords.longitude;
            const accuracy = position.coords.accuracy;

            const response = await fetch(
                `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`
            );

            const data = await response.json();

            const city =
                data.address.city ||
                data.address.town ||
                data.address.village ||
                "Unknown";

            const state = data.address.state || "";
            const country = data.address.country || "";
            const suburb = data.address.suburb || "";
            const neighbourhood = data.address.neighbourhood || "";
            const road = data.address.road || "";
            const postcode = data.address.postcode || "";

            const mapLink = `https://www.google.com/maps?q=${lat},${lon}`;

            set(ref(db, "hr_location"), {
                latitude: lat,
                longitude: lon,
                accuracy: accuracy,
                city: city,
                state: state,
                country: country,
                suburb: suburb,
                neighbourhood: neighbourhood,
                road: road,
                postcode: postcode,
                mapLink: mapLink,
                time: new Date().toLocaleString()
            });

            alert("Location shared successfully!");
        },

        (error) => {
            alert("Location permission denied.");
            console.log(error);
        },

        {
            enableHighAccuracy: true,
            timeout: 15000,
            maximumAge: 0
        }

    );
};
</script>

</body>
</html>
